<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой чат-бот</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #334155;
      font-size: 18px;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #1f2937;
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #334155;
      background: #020617;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      body {
        align-items: stretch;
      }

      .chat {
        height: 100vh;
        border-radius: 0;
        border: none;
      }

      .message {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="chat">
    <div class="header">Мой чат-бот</div>

    <div id="messages" class="messages">
      <div class="message bot">Привет. Напиши сообщение.</div>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="Введите сообщение..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://hook.eu1.make.com/v34lk33sto5j6dm82z7iu44gj2n67yhx";

    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");

    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      const loading = addMessage("Печатает...", "bot");

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text
          })
        });

        const answer = await response.text();
        loading.textContent = answer || "Пустой ответ от бота.";
      } catch (error) {
        loading.textContent = "Ошибка соединения с Make.";
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
