<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой чат-бот</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login, .chat {
      width: 100%;
      max-width: 720px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      overflow: hidden;
    }

    .login {
      padding: 24px;
      max-width: 420px;
    }

    .login h1 {
      margin-top: 0;
      font-size: 22px;
    }

    .login input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .login button {
      width: 100%;
      height: 46px;
    }

    .error {
      color: #f87171;
      margin-top: 12px;
      min-height: 20px;
    }

    .chat {
      height: 90vh;
      display: none;
      flex-direction: column;
    }

    .header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #334155;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout {
      background: #334155;
      color: #e5e7eb;
      padding: 8px 12px;
      font-size: 14px;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #1f2937;
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #334155;
      background: #020617;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      body { align-items: stretch; }

      .chat {
        height: 100vh;
        border-radius: 0;
        border: none;
      }

      .login {
        margin: auto 12px;
      }

      .message {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

 <div id="loginBox" class="login">
  <h1>Вход в чат</h1>

  <input id="nameInput" type="text" placeholder="Введите имя" />
  <input id="passwordInput" type="password" placeholder="Введите пароль" />

  <button onclick="login()">Войти</button>
  <div id="loginError" class="error"></div>
</div>

  <div id="chatBox" class="chat">
    <div class="header">
      <span>Мой чат-бот</span>
      <button class="logout" onclick="logout()">Выйти</button>
    </div>

    <div id="messages" class="messages">
      <div class="message bot">Привет. Напиши сообщение.</div>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="Введите сообщение..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://hook.eu1.make.com/v34lk33sto5j6dm82z7iu44gj2n67yhx";
    

    const loginBox = document.getElementById("loginBox");
    const chatBox = document.getElementById("chatBox");
    const passwordInput = document.getElementById("passwordInput");
    const nameInput = document.getElementById("nameInput");
    const loginError = document.getElementById("loginError");

    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");

    function showChat() {
      loginBox.style.display = "none";
      chatBox.style.display = "flex";
      input.focus();
    }

    function showLogin() {
      loginBox.style.display = "block";
      chatBox.style.display = "none";
      passwordInput.focus();
    }

   async function login() {
  const name = nameInput.value.trim();
  const password = passwordInput.value.trim();

  if (!name || !password) {
    loginError.textContent = "Введите имя и пароль";
    return;
  }

  loginError.textContent = "Проверка доступа...";

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        type: "login",
        name: name,
        password: password
      })
    });

    const answer = await response.text();

    if (!response.ok || answer !== "OK") {
      loginError.textContent = "Доступ запрещён";
      return;
    }

    localStorage.setItem("bot_auth", "yes");
    localStorage.setItem("bot_name", name);
    localStorage.setItem("bot_password", password);

    loginError.textContent = "";
    showChat();

  } catch (error) {
    loginError.textContent = "Ошибка соединения с Сервисом";
  }
}

    function logout() {
      localStorage.removeItem("bot_auth");
      localStorage.removeItem("bot_password");
      passwordInput.value = "";
      showLogin();
    }

    window.onload = function () {
      if (localStorage.getItem("bot_auth") === "yes") {
        showChat();
      } else {
        showLogin();
      }
    };

    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        login();
      }
    });

    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      const password = localStorage.getItem("bot_password");

      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      const loading = addMessage("Печатает...", "bot");

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
         body: JSON.stringify({
          type: "message",
          name: localStorage.getItem("bot_name"),
          message: text,
          password: password
        })
        });

        const answer = await response.text();

        if (response.status === 403 || answer === "Доступ запрещён") {
          loading.textContent = "Доступ запрещён.";
          logout();
          return;
        }

        loading.textContent = answer || "Пустой ответ от бота.";
      } catch (error) {
        loading.textContent = "Ошибка соединения с Make.";
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
