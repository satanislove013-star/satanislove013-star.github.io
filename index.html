<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой чат-бот</title>
</head>
<body>
  <h1>Мой чат-бот</h1>

  <input id="msg" placeholder="Введите сообщение">
  <button onclick="send()">Отправить</button>

  <pre id="answer"></pre>

  <script>
    async function send() {
      const text = document.getElementById('msg').value;

      const res = await fetch('СЮДА_ВСТАВИШЬ_WEBHOOK_MAKE', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: text })
      });

      const data = await res.text();
      document.getElementById('answer').textContent = data;
    }
  </script>
</body>
</html>
